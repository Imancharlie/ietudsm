{% extends 'base.html' %}

{% block title %}Server Error - IET Membership System{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6 text-center">
            <div class="card shadow-lg border-0" style="border-radius: 20px; overflow: hidden;">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="bi bi-exclamation-circle" style="font-size: 6rem; color: var(--iet-error);"></i>
                    </div>
                    <h1 class="display-1 fw-bold mb-3" style="color: var(--iet-error);">500</h1>
                    <h2 class="h3 mb-4">Server Error</h2>
                    <p class="text-muted mb-4 fs-5">
                        Something went wrong on our end. Our team has been notified and is working to fix it.
                    </p>
                    <div class="d-flex gap-3 justify-content-center">
                        <a href="{% url 'landing' %}" class="btn btn-lg" 
                           style="background: linear-gradient(135deg, var(--iet-primary) 0%, var(--iet-primary-dark) 100%); color: white; border: none; border-radius: 10px;">
                            <i class="bi bi-house-door"></i> Go to Home
                        </a>
                        <a href="javascript:history.back()" class="btn btn-lg btn-outline-secondary" 
                           style="border-radius: 10px;">
                            <i class="bi bi-arrow-left"></i> Go Back
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
