{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} - Admin Panel{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{% url 'system_config:highlights' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back to Highlights
    </a>
</div>

<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="card-title mb-0"><i class="bi bi-images"></i> {{ title }}</h4>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="{% url 'system_config:highlights' %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Save Highlight
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
